name: jax-mps

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Used in cache keys so caches don't cross runner OSes. NOT usable in
  # `runs-on:` — the `env` context is not available there (GitHub Actions
  # limitation). Keep this in sync with the literal `runs-on:` values below.
  RUNNER_IMAGE: macos-26

jobs:
  # Three parallel dependency builds with independent caches.
  # Each cache key hashes only the relevant script(s), so bumping MLX
  # no longer forces an LLVM rebuild (~1h).
  setup-llvm:
    name: Setup LLVM/StableHLO
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Check cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}
          lookup-only: true

      - name: Install build tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install cmake ninja

      - name: Build LLVM/StableHLO/XLA headers
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./scripts/setup_deps_llvm.sh --prefix "${{ github.workspace }}/.jax-mps-deps/llvm"
        env:
          JOBS: 4

      - name: Save cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}

  setup-protobuf:
    name: Setup Protobuf
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Check cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}
          lookup-only: true

      - name: Install build tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install cmake ninja

      - name: Build Abseil + Protobuf
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./scripts/setup_deps_protobuf.sh --prefix "${{ github.workspace }}/.jax-mps-deps/protobuf"
        env:
          JOBS: 4

      - name: Save cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}

  setup-mlx:
    name: Setup MLX
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Check cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}
          lookup-only: true

      - name: Install build tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install cmake ninja

      - name: Build MLX
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./scripts/setup_deps_mlx.sh --prefix "${{ github.workspace }}/.jax-mps-deps/mlx"
        env:
          JOBS: 4

      - name: Save cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}

  build:
    name: Build wheel
    needs: [setup-llvm, setup-protobuf, setup-mlx]
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Restore LLVM cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}
          fail-on-cache-miss: true

      - name: Restore Protobuf cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}
          fail-on-cache-miss: true

      - name: Restore MLX cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}
          fail-on-cache-miss: true

      - name: Install dependencies
        run: uv sync --all-groups --no-install-project

      - name: Build wheel
        run: |
          # Pin the wheel's platform tag (e.g. macosx_14_0_arm64) to the
          # deployment target instead of letting scikit-build-core track the
          # runner OS -- otherwise the macos-26 runner tags wheels macosx_26_0,
          # locking out older macOS. Value from the single source of truth.
          export MACOSX_DEPLOYMENT_TARGET="$(cat macos-deployment-target)"
          uv build --wheel
        env:
          CMAKE_ARGS: "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/.jax-mps-deps/llvm;${{ github.workspace }}/.jax-mps-deps/protobuf;${{ github.workspace }}/.jax-mps-deps/mlx"

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/*.whl

  lint-cpp:
    name: Lint C++
    needs: [setup-llvm, setup-protobuf, setup-mlx]
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Restore LLVM cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}
          fail-on-cache-miss: true

      - name: Restore Protobuf cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}
          fail-on-cache-miss: true

      - name: Restore MLX cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}
          fail-on-cache-miss: true

      - name: Install llvm
        uses: tecolicom/actions-use-homebrew-tools@v1
        with:
          tools: llvm

      - name: clang-format
        run: uvx pre-commit run clang-format --all-files

      - name: cmake configure
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_PREFIX_PATH="${{ github.workspace }}/.jax-mps-deps/llvm;${{ github.workspace }}/.jax-mps-deps/protobuf;${{ github.workspace }}/.jax-mps-deps/mlx"

      - name: clang-tidy
        run: |
          export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
          find src -type f -name "*.cc" ! -name "pjrt_executable.cc" | xargs -n 1 -P $(sysctl -n hw.ncpu) clang-tidy -p build

  lint-python:
    name: Lint Python
    needs: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Install wheel and dependencies
        run: |
          uv sync --all-groups --no-install-project
          uv pip install dist/*.whl

      - name: ruff format
        run: .venv/bin/ruff format --check src tests

      - name: ruff check
        run: .venv/bin/ruff check src tests

      - name: pyright
        run: .venv/bin/pyright

  smoke-test-wheel:
    name: Smoke-test wheel
    needs: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      # The wheel is tagged py3-none-macosx_<ver>_arm64: one artifact meant to
      # load under every supported CPython (the plugin is a pure C PJRT dylib
      # with no libpython linkage). Install that same wheel under each version
      # and confirm the dylib loads. Device-free — the runner has no MPS GPU —
      # so it checks packaging + dynamic loading, not compute. The default
      # bash -e aborts the step on the first version that fails.
      - name: Load wheel under each supported Python
        run: |
          WHEEL=$(ls dist/*.whl)
          for PY in 3.11 3.12 3.13; do
            echo "=== Python $PY ==="
            uv run --python "$PY" --no-project --with "$WHEEL" python scripts/smoke_test_wheel.py
          done

  build-dev:
    name: Build dev wheel
    needs: [setup-llvm, setup-protobuf, setup-mlx]
    runs-on: macos-26
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Restore LLVM cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}
          fail-on-cache-miss: true

      - name: Restore Protobuf cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}
          fail-on-cache-miss: true

      - name: Restore MLX cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('macos-deployment-target', 'scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}
          fail-on-cache-miss: true

      - name: Build dev wheel
        run: |
          BASE_VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)
          DEV_VERSION="${BASE_VERSION}.dev${{ github.run_number }}"
          echo "Building version: $DEV_VERSION"
          sed -i '' "s/^version = \".*\"/version = \"$DEV_VERSION\"/" pyproject.toml
          # See "Build wheel" above: pin platform tag to the deployment target.
          export MACOSX_DEPLOYMENT_TARGET="$(cat macos-deployment-target)"
          uv build --wheel
        env:
          CMAKE_ARGS: "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/.jax-mps-deps/llvm;${{ github.workspace }}/.jax-mps-deps/protobuf;${{ github.workspace }}/.jax-mps-deps/mlx"

      - name: Upload dev wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-dev
          path: dist/*.whl

  test:
    name: Test
    needs: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Install wheel and test dependencies
        run: |
          uv sync --all-groups --no-install-project
          uv pip install dist/*.whl

      # MPS is not available on the runner yet. We explicitly skip this step to
      # highlight the gap ...
      # https://docs.github.com/en/actions/reference/runners/github-hosted-runners#limitations-for-arm64-macos-runners
      - name: Run pytest
        if: false
        # We use .venv/bin/pytest rather than uv run pytest to prevent uv from
        # attempting to re-build the editable package. It should use the pre-built
        # wheel.
        run: .venv/bin/pytest tests/ -v

      # ... we then run the tests only on the CPU to check that the tests *could* run.
      - name: Run tests on CPU
        run: .venv/bin/pytest tests/ -v
        env:
          JAX_PLATFORMS: cpu
          JAX_TEST_MODE: cpu

  test-jax-canary:
    name: Test (jax ${{ matrix.channel }})
    needs: build
    runs-on: macos-26
    # Forward-looking canary: run the device-free plugin-registration test
    # against the newest in-range jax and the nightly pre-release, so a
    # jax-internal move that silently breaks fused-op registration (e.g. the
    # jax._src.prng removal in 0.10.2, #216) is caught before users hit it.
    # #216 slipped through precisely because the range allowed 0.10.2 while CI
    # only tested the pinned version.
    #
    # Informational only (continue-on-error) — the runner has no MPS GPU, so
    # this verifies registration, not the mps compute path. The full suite runs
    # on the pinned version in the `test` job; registration is checked there too
    # (tests/test_plugin_registration.py), so this only adds the version spread.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # latest  = newest release still inside `jax>=0.10.0,<0.11`;
        # nightly = jax pre-release wheel (ahead of the range — next-major warning).
        channel: [latest, nightly]
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Install test dependencies and wheel
        # --no-deps on the wheel so the channel-selected jax/jaxlib (below) is
        # not overridden by the wheel's own `<0.11` pin — needed for nightly,
        # which is ahead of that range.
        run: |
          uv sync --all-groups --no-install-project
          uv pip install --no-deps dist/*.whl

      - name: Select jax/jaxlib (${{ matrix.channel }})
        run: |
          case "${{ matrix.channel }}" in
            latest)
              uv pip install --upgrade "jax<0.11" "jaxlib<0.11" ;;
            nightly)
              # --upgrade is required: jax/jaxlib are already installed at the
              # pinned version by `uv sync`, and without it uv leaves them in
              # place (the bare requirement is already satisfied) instead of
              # pulling the nightly pre-release.
              uv pip install --upgrade --prerelease=allow --pre jax jaxlib \
                --index https://us-python.pkg.dev/ml-oss-artifacts-published/jax/simple/ \
                --index-strategy unsafe-best-match ;;
          esac
          .venv/bin/python -c "import jax, jaxlib; print('jax', jax.__version__); print('jaxlib', jaxlib.__version__)"

      - name: Plugin registration check (device-free)
        # Run the check as plain python, not pytest: the canary installs a
        # newest/pre-release jax, and conftest.py imports the config helpers
        # (tests/configs/*), which import flax -- pinned for the pinned-jax
        # suite and not yet compatible here (flax touches jax.core.Effect,
        # removed in jax 0.11), so pytest aborts at collection before our code
        # runs. Plain python skips conftest entirely. This exercises the same
        # device-free initialize() path; the -W filters mirror pytest.ini's
        # filterwarnings (promote jax-mps degradation warnings to errors, exempt
        # the expected jaxlib build/runtime mismatch). The pytest form
        # (tests/test_plugin_registration.py) still runs on the pinned jax in
        # the `test` job.
        run: |
          .venv/bin/python -W "error:jax-mps" -W "ignore:jax-mps was built for jaxlib" -c "import jax_plugins.mps; from jax_plugins.mps import ops; jax_plugins.mps.initialize(); assert 'mps' in ops.mlir._platform_specific_lowerings; print('registration OK')"
        env:
          JAX_PLATFORMS: cpu

  release:
    name: Release
    needs: [test, lint-cpp, lint-python, smoke-test-wheel]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-dev:
    name: Publish dev release
    needs: [test, lint-cpp, lint-python, build-dev]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
    steps:
      - name: Download dev wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel-dev
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
