name: jax-mps

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # Used in cache keys so caches don't cross runner OSes. NOT usable in
  # `runs-on:` — the `env` context is not available there (GitHub Actions
  # limitation). Keep this in sync with the literal `runs-on:` values below.
  RUNNER_IMAGE: macos-26

jobs:
  # Three parallel dependency builds with independent caches.
  # Each cache key hashes only the relevant script(s), so bumping MLX
  # no longer forces an LLVM rebuild (~1h).
  setup-llvm:
    name: Setup LLVM/StableHLO
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Check cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}
          lookup-only: true

      - name: Install build tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install cmake ninja

      - name: Build LLVM/StableHLO/XLA headers
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./scripts/setup_deps_llvm.sh --prefix "${{ github.workspace }}/.jax-mps-deps/llvm"
        env:
          JOBS: 4

      - name: Save cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}

  setup-protobuf:
    name: Setup Protobuf
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Check cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}
          lookup-only: true

      - name: Install build tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install cmake ninja

      - name: Build Abseil + Protobuf
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./scripts/setup_deps_protobuf.sh --prefix "${{ github.workspace }}/.jax-mps-deps/protobuf"
        env:
          JOBS: 4

      - name: Save cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}

  setup-mlx:
    name: Setup MLX
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Check cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}
          lookup-only: true

      - name: Install build tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install cmake ninja

      - name: Build MLX
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./scripts/setup_deps_mlx.sh --prefix "${{ github.workspace }}/.jax-mps-deps/mlx"
        env:
          JOBS: 4

      - name: Save cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}

  build:
    name: Build wheel
    needs: [setup-llvm, setup-protobuf, setup-mlx]
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Restore LLVM cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}
          fail-on-cache-miss: true

      - name: Restore Protobuf cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}
          fail-on-cache-miss: true

      - name: Restore MLX cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}
          fail-on-cache-miss: true

      - name: Install dependencies
        run: uv sync --all-groups --no-install-project

      - name: Build wheel
        run: uv build --wheel
        env:
          # Pin the wheel's platform tag (macosx_13_0_arm64) to the deployment
          # target instead of letting scikit-build-core track the runner OS.
          # Without this, the macos-26 runner tags wheels macosx_26_0, locking
          # out older macOS. Keep in sync with CMAKE_OSX_DEPLOYMENT_TARGET.
          MACOSX_DEPLOYMENT_TARGET: "13.0"
          CMAKE_ARGS: "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/.jax-mps-deps/llvm;${{ github.workspace }}/.jax-mps-deps/protobuf;${{ github.workspace }}/.jax-mps-deps/mlx"

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/*.whl

  lint-cpp:
    name: Lint C++
    needs: [setup-llvm, setup-protobuf, setup-mlx]
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Restore LLVM cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}
          fail-on-cache-miss: true

      - name: Restore Protobuf cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}
          fail-on-cache-miss: true

      - name: Restore MLX cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}
          fail-on-cache-miss: true

      - name: Install llvm
        uses: tecolicom/actions-use-homebrew-tools@v1
        with:
          tools: llvm

      - name: clang-format
        run: uvx pre-commit run clang-format --all-files

      - name: cmake configure
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_PREFIX_PATH="${{ github.workspace }}/.jax-mps-deps/llvm;${{ github.workspace }}/.jax-mps-deps/protobuf;${{ github.workspace }}/.jax-mps-deps/mlx"

      - name: clang-tidy
        run: |
          export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
          find src -type f -name "*.cc" ! -name "pjrt_executable.cc" | xargs -n 1 -P $(sysctl -n hw.ncpu) clang-tidy -p build

  lint-python:
    name: Lint Python
    needs: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Install wheel and dependencies
        run: |
          uv sync --all-groups --no-install-project
          uv pip install dist/*.whl

      - name: ruff format
        run: .venv/bin/ruff format --check src tests

      - name: ruff check
        run: .venv/bin/ruff check src tests

      - name: pyright
        run: .venv/bin/pyright

  build-dev:
    name: Build dev wheel
    needs: [setup-llvm, setup-protobuf, setup-mlx]
    runs-on: macos-26
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Restore LLVM cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/llvm
          key: deps-llvm-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_llvm.sh') }}
          fail-on-cache-miss: true

      - name: Restore Protobuf cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/protobuf
          key: deps-protobuf-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_protobuf.sh') }}
          fail-on-cache-miss: true

      - name: Restore MLX cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/.jax-mps-deps/mlx
          key: deps-mlx-v1-${{ env.RUNNER_IMAGE }}-${{ hashFiles('scripts/setup_deps_common.sh', 'scripts/setup_deps_mlx.sh', 'third_party/mlx/version.txt', 'third_party/mlx/patches/*') }}
          fail-on-cache-miss: true

      - name: Build dev wheel
        run: |
          BASE_VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)
          DEV_VERSION="${BASE_VERSION}.dev${{ github.run_number }}"
          echo "Building version: $DEV_VERSION"
          sed -i '' "s/^version = \".*\"/version = \"$DEV_VERSION\"/" pyproject.toml
          uv build --wheel
        env:
          # See "Build wheel" above: pin platform tag to the deployment target.
          MACOSX_DEPLOYMENT_TARGET: "13.0"
          CMAKE_ARGS: "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/.jax-mps-deps/llvm;${{ github.workspace }}/.jax-mps-deps/protobuf;${{ github.workspace }}/.jax-mps-deps/mlx"

      - name: Upload dev wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-dev
          path: dist/*.whl

  test:
    name: Test
    needs: build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Install wheel and test dependencies
        run: |
          uv sync --all-groups --no-install-project
          uv pip install dist/*.whl

      # MPS is not available on the runner yet. We explicitly skip this step to
      # highlight the gap ...
      # https://docs.github.com/en/actions/reference/runners/github-hosted-runners#limitations-for-arm64-macos-runners
      - name: Run pytest
        if: false
        # We use .venv/bin/pytest rather than uv run pytest to prevent uv from
        # attempting to re-build the editable package. It should use the pre-built
        # wheel.
        run: .venv/bin/pytest tests/ -v

      # ... we then run the tests only on the CPU to check that the tests *could* run.
      - name: Run tests on CPU
        run: .venv/bin/pytest tests/ -v
        env:
          JAX_PLATFORMS: cpu
          JAX_TEST_MODE: cpu

  test-jax-latest:
    name: Test (jax/jaxlib latest)
    needs: build
    runs-on: macos-26
    # Canary: install the newest jax/jaxlib allowed by pyproject so we learn
    # about upstream-breaking patch releases (e.g. #162) before users do.
    # Informational only — does not block PRs.
    continue-on-error: true
    # Disabled until an MPS-capable runner is available: the affected
    # lowerings register only for platform="mps", so a CPU-only run would
    # not actually exercise them. Re-enable by removing this `if: false`.
    if: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Install wheel and test dependencies (jax/jaxlib upgraded)
        run: |
          uv sync --all-groups --no-install-project --upgrade-package jax --upgrade-package jaxlib
          uv pip install dist/*.whl
          .venv/bin/python -c "import jax, jaxlib; print('jax', jax.__version__); print('jaxlib', jaxlib.__version__)"

      - name: Run tests on CPU
        run: .venv/bin/pytest tests/ -v
        env:
          JAX_PLATFORMS: cpu
          JAX_TEST_MODE: cpu

  release:
    name: Release
    needs: [test, lint-cpp, lint-python]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-dev:
    name: Publish dev release
    needs: [test, lint-cpp, lint-python, build-dev]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
    steps:
      - name: Download dev wheel
        uses: actions/download-artifact@v8
        with:
          name: wheel-dev
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
