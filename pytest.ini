[pytest]
addopts =
    -v
    -n auto
    -m "not benchmark"
    --benchmark-group-by=param:op_config
    --benchmark-columns=min,max,mean,stddev,rounds
testpaths = tests
# Promote the plugin's own degradation warnings to errors so a silent fallback
# (e.g. register_fused_ops no-opping when a jax internal moves between releases,
# issue #216) fails the suite instead of shipping quietly. Scoped to the
# "jax-mps" message prefix so third-party deprecation warnings are unaffected.
# The jaxlib build/runtime version-mismatch warning is exempted: it is an
# expected, version-driven notice (e.g. the jax-nightly canary runs a newer
# jaxlib than the wheel was built for), not a registration regression, so
# promoting it would mask the signal it is meant to surface. Later filters win.
filterwarnings =
    error:jax-mps
    ignore:jax-mps was built for jaxlib
markers =
    noop: No-op marker that does nothing
    benchmark: Benchmark tests (excluded by default)
